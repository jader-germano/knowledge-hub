stages:
  - sync

mesh-sync:
  stage: sync
  tags:
    - vps
    - mesh-sync
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
  script:
    - /sync/jpglabs-docs/scripts/mesh-sync.sh "$CI_COMMIT_REF_NAME"
