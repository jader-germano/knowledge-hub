stages:
  - sync

mesh-sync:
  stage: sync
  image: alpine:3.21
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H srv1443703.hstgr.cloud >> ~/.ssh/known_hosts 2>/dev/null
    - ssh -o StrictHostKeyChecking=accept-new root@srv1443703.hstgr.cloud "/sync/jpglabs-docs/scripts/mesh-sync.sh $CI_COMMIT_REF_NAME"
