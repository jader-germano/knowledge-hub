```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinball Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; background-color: black; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let score = 0;
    let paddle1Pos = canvas.height / 2 - 50, paddle2Pos = paddle1Pos;

    function Ball(x, y, dx, dy) {
        this.x = x;
        this.y = y;
        this.dx = dx;
        this.dy = dy;
        this.radius = 8;

        this.draw = () => {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.closePath();
        };

        this.update = () => {
            if (this.x + this.dx > canvas.width - this.radius || this.x + this.dx < this.radius) {
                this.dx *= -1;
            }
            if (this.y + this.dy > canvas.height - this.radius || this.y + this.dy < this.radius) {
                this.dy *= -1;
            }

            // Collision with paddles
            if ((this.x >= 5 && this.x <= 20) &&
                (paddle1Pos <= this.y && paddle1Pos + 100 > this.y)) {
                this.dx = Math.abs(this.dx);
            }
            if ((this.x >= canvas.width - 28 && this.x < canvas.width - 13) &&
                (paddle2Pos <= this.y && paddle2Pos + 100 > this.y)) {
                this.dx = -Math.abs(this.dx);
            }

            this.x += this.dx;
            this.y += this.dy;

            this.draw();
        };
    }
    
    let ball = new Ball(canvas.width / 2, canvas.height / 2, 4 * (Math.random() > .5 ? 1 : -1), 3);

    function drawPaddles() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, paddle1Pos, 10, 100);
        ctx.fillRect(canvas.width - 10, paddle2Pos, 10, 100);
    }

    document.addEventListener('keydown', (e) => {
        if(e.key === "ArrowUp") {
            paddle1Pos -= 25;
        } else if(e.key === "ArrowDown") {
            paddle1Pos += 25;
        }
    });

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawPaddles();
        ball.update();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();

</script>
</body>
</html>
