```html
<!DOCTYPE html>
<html>
<head>
    <title>Angry Birds Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Physics constants
        const GRAVITY = 0.5;
        const FRICTION = 0.99;
        const BOUNCE = 0.7;

        // Game objects
        let birds = [];
        let pigs = [];
        let blocks = [];
        let slingshot = { x: 100, y: 300, power: 0, angle: 0 };
        let isAiming = false;
        let score = 0;
        let gameOver = false;
        let birdLaunched = false;

        // Bird class
        class Bird {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 15;
                this.vx = 0;
                this.vy = 0;
                this.color = '#FF5733';
                this.isDead = false;
            }

            update() {
                if (this.isDead) return;
                
                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;
                
                this.vx *= FRICTION;
                this.vy *= FRICTION;
                
                // Boundary collision
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx = -this.vx * BOUNCE;
                }
                if (this.x + this.radius > canvas.width) {
                    this.x = canvas.width - this.radius;
                    this.vx = -this.vx * BOUNCE;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy = -this.vy * BOUNCE;
                }
                if (this.y + this.radius > canvas.height) {
                    this.y = canvas.height - this.radius;
                    this.vy = -this.vy * BOUNCE;
                    if (Math.abs(this.vy) < 0.5) this.vy = 0;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
                
                // Draw eye
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y - 3, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.closePath();
                
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y - 3, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();
                ctx.closePath();
            }
        }

        // Pig class
        class Pig {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 20;
                this.color = '#4CAF50';
                this.isDead = false;
            }

            update() {
                // Pigs don't move
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
                
                // Draw eyes
                ctx.beginPath();
                ctx.arc(this.x - 7, this.y - 5, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 7, this.y - 5, 4, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.closePath();
                
                ctx.beginPath();
                ctx.arc(this.x - 7, this.y - 5, 2, 0, Math.PI * 2);
                ctx.arc(this.x + 7, this.y - 5, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'black';
                ctx.fill();
                ctx.closePath();
                
                // Draw mouth
                ctx.beginPath();
                ctx.arc(this.x, this.y + 5, 8, 0, Math.PI);
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();
            }
        }

        // Block class
        class Block {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.color = '#8B4513';
                this.isDead = false;
            }

            update() {
                // Blocks don't move
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                
                // Draw wood texture
                ctx.strokeStyle = '#A0522D';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.moveTo(this.x, this.y + this.height);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.stroke();
            }
        }

        // Initialize game
        function initGame() {
            birds = [new Bird(slingshot.x, slingshot.y)];
            pigs = [
                new Pig(600, canvas.height - 50),
                new Pig(700, canvas.height - 50),
                new Pig(800, canvas.height - 50)
            ];
            blocks = [
                new Block(580, canvas.height - 100, 40, 40),
                new Block(640, canvas.height - 100, 40, 40),
                new Block(700, canvas.height - 100, 40, 40),
                new Block(760, canvas.height - 100, 40, 40),
                new Block(820, canvas.height - 100, 40, 40)
            ];
            score = 0;
            gameOver = false;
            birdLaunched = false;
            slingshot.power = 0;
        }

        // Collision detection
        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (obj1.radius + obj2.radius);
        }

        // Update game state
        function update() {
            if (gameOver) return;
            
            // Update birds
            birds.forEach(bird => {
                if (!bird.isDead) {
                    bird.update();
                    
                    // Check collisions with pigs
                    pigs.forEach(pig => {
                        if (!pig.isDead && checkCollision(bird, pig)) {
                            pig.isDead = true;
                            bird.isDead = true;
                            score += 100;
                        }
                    });
                    
                    // Check collisions with blocks
                    blocks.forEach(block => {
                        if (!block.isDead && 
                            bird.x + bird.radius > block.x && 
                            bird.x - bird.radius < block.x + block.width &&
                            bird.y + bird.radius > block.y && 
                            bird.y - bird.radius < block.y + block.height) {
                            block.isDead = true;
                            bird.isDead = true;
                            score += 50;
                        }
                    });
                }
            });
            
            // Check if all pigs are dead
            const allPigsDead = pigs.every(pig => pig.isDead);
            if (allPigsDead && birds.every(bird => bird.isDead)) {
                gameOver = true;
            }
            
            // Check if bird is out of bounds
            if (birdLaunched && birds[0] && !birds[0].isDead) {
                if (birds[0].x < -50 || birds[0].x > canvas.width + 50 || 
                    birds[0].y > canvas.height + 50) {
                    birds[0].isDead = true;
                }
            }
        }

        // Draw game
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            
            // Draw grass
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 10);
            
            // Draw slingshot
            ctx.beginPath();
            ctx.moveTo(slingshot.x, slingshot.y);
            ctx.lineTo(slingshot.x, slingshot.y - 50);
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 5;
            ctx.stroke();
            
            // Draw elastic
            if (isAiming && !birdLaunched) {
                ctx.beginPath();
                ctx.moveTo(slingshot.x, slingshot.y);
                ctx.lineTo(birds[0].x, birds[0].y);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            // Draw birds
            birds.forEach(bird => {
                if (!bird.isDead) {
                    bird.draw();
                }
            });
            
            // Draw pigs
            pigs.forEach(pig => {
                if (!pig.isDead) {
                    pig.draw();
                }
            });
            
            // Draw blocks
            blocks.forEach(block => {
                if (!block.isDead) {
                    block.draw();
                }
            });
            
            // Draw score
            ctx.fillStyle = 'black';
            ctx.font = '24px Arial';
            ctx.fillText(`Score: ${score}`, 20, 40);
            
            // Draw game over
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'white';
                ctx.font = '48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 50);
                
                ctx.font = '24px Arial';
                ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                ctx.fillText('Click to restart', canvas.width / 2, canvas.height / 2 + 60);
            }
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            if (gameOver) {
                initGame();
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            if (birds.length > 0 && !birdLaunched) {
                const bird = birds[0];
                const dx = bird.x - mouseX;
                const dy = bird.y - mouseY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < bird.radius * 2) {
                    isAiming = true;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (gameOver || !isAiming) return;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const bird = birds[0];
            if (bird && !birdLaunched) {
                const dx = mouseX - slingshot.x;
                const dy = mouseY - slingshot.y;
                slingshot.angle = Math.atan2(dy, dx);
                slingshot.power = Math.min(Math.sqrt(dx * dx + dy * dy) / 20, 10);
                
                bird.x = slingshot.x - Math.cos(slingshot.angle) * slingshot.power * 10;
                bird.y = slingshot.y - Math.sin(slingshot.angle) * slingshot.power * 10;
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (gameOver || !isAiming) return;
            
            isAiming = false;
            birdLaunched = true;
            
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const bird = birds[0];
            if (bird) {
                const dx = slingshot.x - mouseX;
                const dy = slingshot.y - mouseY;
                bird.vx = dx * 0.2;
                bird.vy = dy * 0.2;
            }
        });

        // Initialize and start game
        initGame();
        gameLoop();
    </script>
</body>
</html>
