# axis-llm-preset.yaml
# ----------------------------------------------------------------------
# Preset de roteamento LLM local para integração Axis.
# Fonte de verdade do catálogo da VPS + capability routing.
# Consumers (axis, openclaude, n8n workflows, etc.) leem este arquivo
# para decidir qual modelo chamar por tarefa.
#
# Schema auto-explicativo — não depende de LiteLLM/OpenRouter.
# Mantido em sincronia com: vps-ollama-roster-2026-04-23.md
# ----------------------------------------------------------------------

version: 1
generated_at: "2026-04-23"
source_of_truth: jpglabs/docs/infrastructure/docs/vps-ollama-roster-2026-04-23.md

endpoints:
  # Preferência: Tailscale (privado, sem expor 11434 publicamente).
  # Fallback público só quando o peer Tailnet `srv1443703` estiver offline.
  primary:
    name: vps-tailnet
    base_url: http://100.68.217.36:11434
    openai_compat_url: http://100.68.217.36:11434/v1
    transport: tailscale
    health_check:
      path: /v1/models
      timeout_ms: 4000
      expect_status: 200
  fallback:
    name: vps-public
    base_url: http://187.77.227.151:11434
    openai_compat_url: http://187.77.227.151:11434/v1
    transport: public
    condition: use_only_if_tailnet_peer_offline
    health_check:
      path: /v1/models
      timeout_ms: 4000
      expect_status: 200

# Defaults efetivos do servidor (informativo — não precisa repassar em cada request).
server_defaults:
  num_ctx: 16384
  keep_alive: 24h
  num_parallel: 2
  num_threads: 8
  flash_attention: true
  max_loaded_models: 2

