# Roteamento por capability — Axis usa isto para decidir qual modelo invocar.
# Consumer pede `capability`, preset resolve para `primary` e prepara `fallback_chain`.
routing:
  coder:
    primary: qwen3-coder:30b
    fallback_chain: [qwen2.5-coder:14b, deepseek-coder-v2:16b, qwen2.5-coder:7b]
    reason: "MoE A3B + licença comercial-ok + 27 tok/s (2.3x phi4)"
  reasoning:
    primary: gpt-oss:20b
    fallback_chain: [phi4:14b, qwen2.5:32b-instruct-q4_K_M]
    reason: "Apache-2.0 + tool-use nativo + MoE"
  tool_use:
    primary: gpt-oss:20b
    fallback_chain: [qwen3-coder:30b]
    reason: "gpt-oss foi treinado p/ function calling; qwen3-coder aceita OpenAI tool format"
  math:
    primary: phi4:14b
    fallback_chain: [qwen2.5:32b-instruct-q4_K_M, gpt-oss:20b]
    reason: "phi-4 ganha surpreendentemente em math bench apesar de denso 14B"
  general_ptbr:
    primary: qwen2.5:32b-instruct-q4_K_M
    fallback_chain: [gemma4:26b, qwen3-coder:30b]
    reason: "Qwen2.5 tem PT-BR forte; fallback gemma quando precisar estilo menos técnico"
  fast_cheap:
    primary: qwen2.5-coder:7b
    fallback_chain: [gemma4:e4b]
    reason: "Quando latência importa mais que qualidade"

# Política operacional para o consumer.
policy:
  license_guard:
    production: ["apache-2.0", "mit"]  # whitelist estrita pra qualquer path comercial
    development: "allow_all_with_review"
    block_list_reasons:
      - "MiniMax M2.7 licença não-comercial (vídeo cGIXyqjZSD8)"
      - "Kimi K2.5 após caso Cursor/Composer 2"
  circuit_breaker:
    fail_fast_on_health_check: true
    pre_flight_required: true  # espelha implementação já presente no OpenClaude
  retry:
    max_attempts: 2
    backoff_ms: [500, 1500]
  model_load:
    avoid_cold_load_churn: true
    note: "MAX_LOADED_MODELS=2 — escolher 2 hot models por sessão idealmente"

# Exemplo mínimo de uso — curl direto OpenAI-compatible.
examples:
  curl_openai_compat: |
    curl -sS http://100.68.217.36:11434/v1/chat/completions \
      -H 'Content-Type: application/json' \
      -d '{
        "model": "qwen3-coder:30b",
        "messages": [{"role":"user","content":"Refactor this Python into async"}],
        "temperature": 0.2,
        "max_tokens": 2048
      }'

  node_openai_sdk: |
    import OpenAI from 'openai'
    const client = new OpenAI({
      baseURL: 'http://100.68.217.36:11434/v1',
      apiKey: 'ollama'  // required by SDK but unused by server
    })
    const resp = await client.chat.completions.create({
      model: 'qwen3-coder:30b',
      messages: [{role:'user', content:'...'}]
    })

  python_openai_sdk: |
    from openai import OpenAI
    client = OpenAI(base_url='http://100.68.217.36:11434/v1', api_key='ollama')
    resp = client.chat.completions.create(
        model='qwen3-coder:30b',
        messages=[{'role':'user','content':'...'}]
    )
