# Kubernetes app-lane manifest for the Next.js backend/BFF lane.
# This file remains non-root-domain until the final Kubernetes web owner for
# `jpglabs.com.br` is explicitly chosen. The platform direction is now
# Kubernetes-first for app services; this manifest stays available as part of
# that app platform, but does not force the final root-domain cutover by itself.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jpglabs-portfolio-preview
  namespace: jpglabs
  labels:
    app: portfolio-preview
    tier: backend-preview
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: portfolio-preview
  template:
    metadata:
      labels:
        app: portfolio-preview
    spec:
      containers:
        - name: jpglabs-portfolio-preview
          image: ghcr.io/jader-germano/jpglabs-portfolio-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXTAUTH_URL
              value: "https://portfolio-preview.jpglabs.com.br"
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: supabase-anon-key
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: nextauth-secret
            - name: NEXT_PUBLIC_AI_API
              value: "https://api.jpglabs.com.br"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: jpglabs-portfolio-preview
  namespace: jpglabs
spec:
  selector:
    app: portfolio-preview
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-preview-ingress
  namespace: jpglabs
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  rules:
    - host: portfolio-preview.jpglabs.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jpglabs-portfolio-preview
                port:
                  number: 80
